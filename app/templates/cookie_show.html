{% extends "base.html" %}

{% block content %}

<h2>Show Cookie Example</h2>

{% if site %}
<p><b>Site Name:</b> {{ site }}</p>
<p><b>Visit Time:</b> {{ visit_time }}</p>

<p>These values were read from the browser cookies.</p>

{% else %}
<p>No cookies found. Please create cookies first.</p>

<a href="/cookie">Set Cookie</a>

{% endif %}

{% endblock %}
