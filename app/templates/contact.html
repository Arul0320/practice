{% extends 'base.html' %}

{% block content %}

<h2>Contact Us</h2>

<form method="post" class="mt-3">

{% csrf_token %}

<div class="mb-3">
{{ form.name.label }}
{{ form.name }}
</div>

<div class="mb-3">
{{ form.email.label }}
{{ form.email }}
</div>

<div class="mb-3">
{{ form.message.label }}
{{ form.message }}
</div>

<button class="btn btn-primary">Submit</button>

</form>

{% endblock %}
